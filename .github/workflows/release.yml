name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build standalone binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all targets
        run: bun run build:compile:all

      - name: Compress binaries
        run: |
          cd dist/standalone
          for f in *; do
            case "$f" in
              *.exe) zip "${f}.zip" "$f" ;;
              *)     tar czf "${f}.tar.gz" "$f" ;;
            esac
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: standalone-binaries
          path: |
            dist/standalone/*.tar.gz
            dist/standalone/*.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          BODY=$(awk '/^## \['"$VERSION"'\]/{found=1; next} found && /^## \[/{exit} found{print}' CHANGELOG.md)
          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: standalone-binaries
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.zip > SHA256SUMS.txt

      - name: Generate release notes
        env:
          CHANGELOG_BODY: ${{ steps.changelog.outputs.body }}
        run: |
          bash scripts/generate-release-notes.sh "${{ steps.meta.outputs.tag }}" "${{ github.repository }}" release-notes.md
          # Prepend changelog content before the download instructions
          {
            printf '%s\n\n' "$CHANGELOG_BODY"
            cat release-notes.md
          } > release-notes-full.md
          mv release-notes-full.md release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.meta.outputs.version }}
          body_path: release-notes.md
          make_latest: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/SHA256SUMS.txt

  publish:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and test
        run: |
          set -o pipefail
          bun run check 2>&1 | tee check.log
          bun run test 2>&1 | tee test.log

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
