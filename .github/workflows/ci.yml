name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Bun ${{ matrix.bun-version }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bun-version:
          - "1.3.13"
          - "latest"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run test suite
        run: |
          set -o pipefail
          bun run test 2>&1 | tee test.log

      - name: Run coverage
        env:
          NO_COLOR: "1"
        run: |
          set -o pipefail
          bun run coverage 2>&1 | tee coverage.log

      - name: Export coverage summary
        if: always()
        run: |
          echo "## Coverage (Bun ${{ matrix.bun-version }})" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          if [ ! -f coverage.log ]; then
            echo "| Coverage | No coverage output captured |" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          node -e '
            const fs = require("node:fs")

            const text = fs.readFileSync("coverage.log", "utf8")
            const patterns = ["Statements", "Branches", "Functions", "Lines"]
            const results = patterns
              .map((name) => {
                const match = text.match(new RegExp(`^\\s*${name}\\s*:\\s*([^\\n]+)`, "m"))
                return { name, value: match?.[1]?.trim() ?? "Not found" }
              })

            for (const result of results) {
              console.log(`| ${result.name} | ${result.value} |`)
            }
          ' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-coverage-${{ matrix.bun-version }}
          path: |
            test.log
            coverage.log
